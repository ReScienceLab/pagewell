requesthunt:
  name: RequestHunt
  url: https://requesthunt.com
  category: Feature request discovery
  description: Discover real feature requests from Reddit, X, and GitHub.
  audience:
    - solo founders
    - product builders
    - indie hackers
  command: npx -y @resciencelab/requesthunt-mcp-server
  claims:
    - Finds feature requests from Reddit, X, and GitHub.
    - Offers an MCP server install command.
  cta:
    label: Try RequestHunt
    href: https://requesthunt.com

markshare:
  name: Markshare
  url: https://markshare.to
  category: Markdown publishing
  description: Publish markdown as webpages from the terminal.
  audience:
    - developers
    - founders
    - technical writers
  command: curl -sSL markshare.to/install.sh | bash
  claims:
    - Publishes markdown as webpages from the terminal.
    - Provides a shell install command.
  cta:
    label: Install Markshare
    href: https://markshare.to
